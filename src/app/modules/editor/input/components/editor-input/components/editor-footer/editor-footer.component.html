<div class="editor-footer">
  <div class="editor-status">
    @if (readOnly()) {
    <span class="status-badge readonly-badge">Read Only</span>
    } @else if (isLimitReached()) {
    <span class="status-badge warning-badge">Character Limit Reached</span>
    }
  </div>

  <div style="display: flex; align-items: center;">
    @if (maxLength() !== undefined) {
    <div class="character-count" [class.danger]="isLimitReached()">
      {{ charCount() }} / {{ maxLength() }}
      @if (remainingChars() !== null) {
      <span class="remaining-text">({{ remainingChars() }} left)</span>
      }
    </div>
    }
    @if (!readOnly()) {
    <div class="editor-resize-handle" 
         title="Drag to resize editor"
         (mousedown)="startResize($event)">
      <svg viewBox="0 0 24 24" width="14" height="14">
        <line x1="4" y1="9" x2="20" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="4" y1="15" x2="20" y2="15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    }
  </div>
</div>
